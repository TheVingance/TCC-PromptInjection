# Testes Individuais — mistral:latest (local via Ollama)
# Execução: python scripts/run_experiments.py --model mistral:latest
#        ou: npx promptfoo eval -c promptfoo/mistral.yaml --no-cache

prompts:
  - "{{message}}"

providers:
  - id: "file://../scripts/promptfoo_provider.py"
    label: "FinBot (mistral:latest)"
    config:
      provider: "ollama"
      model_name: "mistral:latest"
      is_adversarial: true
      threat_category: "{{category}}"

tests:
  - file://../tests/payloads.yaml

evaluateOptions:
  repeat: 5  # 20 payloads × 5 repetições = 100 execuções
