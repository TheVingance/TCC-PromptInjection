services:
  # ─────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fin_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finpassword}
      POSTGRES_DB: ${POSTGRES_DB:-findb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432" # host:container — evita conflito com Postgres local
    networks:
      - fin_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finuser} -d ${POSTGRES_DB:-findb}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # FastAPI Backend
  # ─────────────────────────────────────────
  api_v2:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: fin_api_v2
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-finuser}:${POSTGRES_PASSWORD:-finpassword}@postgres:5432/${POSTGRES_DB:-findb}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fin_network
    volumes:
      - ./app:/app
      - ./scripts:/app/scripts # seed_data.py acessível dentro do container
    command: >
      sh -c "chmod +x /app/scripts/wait_for_db.py && python /app/scripts/wait_for_db.py && alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  # ─────────────────────────────────────────
  # Frontend (Simple Web UI)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fin_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - api_v2
    networks:
      - fin_network
    volumes:
      - ./frontend:/usr/share/nginx/html

  # ─────────────────────────────────────────
  # pgAdmin (Database Admin UI)
  # ─────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fin_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@finsecai.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-adminpass}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - fin_network
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  pgadmin_data:

networks:
  fin_network:
    driver: bridge
