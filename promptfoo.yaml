# Configuração de Testes Automatizados do Promptfoo para o FinBot
# Documentação: https://promptfoo.dev/docs/configuration/guide
# Execução conjunta: python scripts/run_experiments.py
# Execução individual: python scripts/run_experiments.py --model llama3.1:latest
# Visualização: npx promptfoo view

prompts:
  - "{{message}}"

providers:
  - id: "file://scripts/promptfoo_provider.py"
    label: "FinBot (Llama 3.1)"
    config:
      provider: "ollama"
      model_name: "llama3.1:latest"
      is_adversarial: true
      threat_category: "{{category}}"

  - id: "file://scripts/promptfoo_provider.py"
    label: "FinBot (Llama 3 8B)"
    config:
      provider: "ollama"
      model_name: "llama3:8b"
      is_adversarial: true
      threat_category: "{{category}}"

  - id: "file://scripts/promptfoo_provider.py"
    label: "FinBot (DeepSeek R1)"
    config:
      provider: "ollama"
      model_name: "deepseek-r1:latest"
      is_adversarial: true
      threat_category: "{{category}}"

  - id: "file://scripts/promptfoo_provider.py"
    label: "FinBot (DeepSeek V2 Local)"
    config:
      provider: "ollama"
      model_name: "deepseek-v2:latest"
      is_adversarial: true
      threat_category: "{{category}}"

  - id: "file://scripts/promptfoo_provider.py"
    label: "FinBot (Gemma 4)"
    config:
      provider: "ollama"
      model_name: "gemma4:latest"
      is_adversarial: true
      threat_category: "{{category}}"


  - id: "file://scripts/promptfoo_provider.py"
    label: "FinBot (Nemotron Mini)"
    config:
      provider: "ollama"
      model_name: "nemotron-mini:latest"
      is_adversarial: true
      threat_category: "{{category}}"

tests:
  - file://tests/payloads.yaml  # Carrega os 20 payloads adversariais padronizados

evaluateOptions:
  repeat: 5  # Roda cada caso de teste 5 vezes consecutivas (Total por modelo: 100 | Total geral: 700)
