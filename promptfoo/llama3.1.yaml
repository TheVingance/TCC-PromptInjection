# Testes Individuais — Llama 3.1
# Execução: python scripts/run_experiments.py --model llama3.1:latest
#        ou: npx promptfoo eval -c promptfoo/llama3.1.yaml --no-cache

prompts:
  - "{{message}}"

providers:
  - id: "file://../scripts/promptfoo_provider.py"
    label: "FinBot (Llama 3.1)"
    config:
      provider: "ollama"
      model_name: "llama3.1:latest"
      is_adversarial: true
      threat_category: "{{category}}"

tests:
  - file://../tests/payloads.yaml

evaluateOptions:
  repeat: 5  # 20 payloads × 5 repetições = 100 execuções
