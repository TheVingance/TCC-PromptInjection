# Testes Individuais — Gemma 4 (local via Ollama)
# Execução: python scripts/run_experiments.py --model gemma4:latest
#        ou: npx promptfoo eval -c promptfoo/gemma4.yaml --no-cache

prompts:
  - "{{message}}"

providers:
  - id: "file://../scripts/promptfoo_provider.py"
    label: "FinBot (Gemma 4)"
    config:
      provider: "ollama"
      model_name: "gemma4:latest"
      is_adversarial: true
      threat_category: "{{category}}"

tests:
  - file://../tests/payloads.yaml

evaluateOptions:
  repeat: 5  # 20 payloads × 5 repetições = 100 execuções
