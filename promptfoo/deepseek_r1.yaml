# Testes Individuais — DeepSeek R1 (local via Ollama)
# Execução: python scripts/run_experiments.py --model deepseek-r1:latest
#        ou: npx promptfoo eval -c promptfoo/deepseek_r1.yaml --no-cache

prompts:
  - "{{message}}"

providers:
  - id: "file://../scripts/promptfoo_provider.py"
    label: "FinBot (DeepSeek R1)"
    config:
      provider: "ollama"
      model_name: "deepseek-r1:latest"
      is_adversarial: true
      threat_category: "{{category}}"

tests:
  - file://../tests/payloads.yaml

evaluateOptions:
  repeat: 5  # 20 payloads × 5 repetições = 100 execuções
